<body>
    <h1>Contact Us</h1>
    <form id="contactForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br>
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone" required>
        <br>
        <label for="message">Message:</label>
        <textarea id="message" name="message" required></textarea>
        <br>
        <label for="preferredContact">Preferred Contact Method:</label>
        <br>
        <input type="radio" id="emailContact" name="preferredContact" value="email">
        <label for="emailContact">Email</label>
        <br>
        <input type="radio" id="phoneContact" name="preferredContact" value="phone">
        <label for="phoneContact">Phone</label>
        <br>
        <label for="interests">Interests:</label>
        <br>
        <input type="checkbox" id="webDesign" name="interests" value="webDesign">
        <label for="webDesign">Web Design</label>
        <br>
        <input type="checkbox" id="seo" name="interests" value="seo">
        <label for="seo">SEO</label>
        <br>
        <input type="checkbox" id="marketing" name="interests" value="marketing">
        <label for="marketing">Marketing</label>
        <br>
        <label for="referrer">How did you hear about us?</label>
        <br>
        <input type="text" id="referrer" name="referrer">
        <br>
        <label for="additionalInfo">Additional Information:</label>
        <br>
        <textarea id="additionalInfo" name="additionalInfo"></textarea>
        <br>
        <button type="submit">Submit</button>
        <button type="reset">Clear/Reset</button>
    </form>
    <script src="script.js"></script>
</body>



</body>
</html>
